



<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>News Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css"/>

<style>

body{
background:#f5f5f5;
}

#gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
padding:15px;
}

.item{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.item img{
width:100%;
height:220px;
object-fit:cover;
transition:.3s;
}

.item img:hover{
transform:scale(1.05);
}

.name{
padding:8px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<h3 class="text-center mt-3">
      <!-- <h2 class="text-danger text-center"> -->       
        📰 भोईमाली संदेश
 </h3>



    
    <div class="alert alert-warning mt-3 text-center">
        यहां समाज की सभी नई घोषणाएं, कार्यक्रम एवं समाचार दिखाई देंगे।
<h2>
      Comming Soon
        
</h2>
    </div>

    

<div id="gallery"></div>

<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.umd.js"></script>

<script>

const API="https://script.google.com/macros/s/AKfycbyGM6kku4T9BVA1oNi5Ok3OPoAmp-O8qlfTiMt3BPwqVJomiczCsmxX9h_0cDfl3j256g/exec";

function loadGallery(){

fetch(API)

.then(r=>r.json())

.then(data=>{

let html="";

data.forEach(x=>{

html+=`

<div class="item">

<a data-fancybox="gallery"
href="${x.image}"
data-caption="${x.name}">

<img
src="${x.image}"
loading="lazy"
alt="${x.name}">

</a>

<div class="name">${x.name}</div>

</div>

`;

});

document.getElementById("gallery").innerHTML=html;

Fancybox.bind("[data-fancybox='gallery']");

});

}

loadGallery();

// हर 30 सेकंड में नई फोटो अपने आप दिखेगी

setInterval(loadGallery,30000);

</script>

</body>
</html>
